<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <h3 class="welcome" style="margin-bottom:10px;">Login</h3>
    <img src="./img/logo.jpg" alt="Image not found" width=105px height=105px id="img">
    <h4 class="welcomeback" style="margin-bottom:10px;">WELCOME BACK</h3>
    <h4 class="purpose" style="margin-bottom:10px; text-align:center"><i>Sign in to your account</i></h3>
    
    <form class="reg">
    <ul class="formlist" type="square"><b>Email</b>
        <li><input type="email" id="email" placeholder="Enter email" required>  </li>
        <b>Password</b><li><input type="password" id="pwd" placeholder="Enter password" required> </li>
    </ul>
    <button class="loginbtn">Login</button>
</body>
</html>
