<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Page</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <h3 style="color:rgb(255, 71, 191)" class="welcome">SOCIETY SURVEY & POLLING MANAGEMENT SYSTEM</h3>
    <h4 class="welcome" style="color:brown ;margin-top:10px">Resident Registration Form</h4>
    <p class="purpose">Create Your Account<br/>
Please fill in the details below to register as a society resident.
</p>
<form class="reg">
    <ul class="formlist">Full Name
        <li><input type="text" id="name" placeholder="Enter Name" required>  </li>
        House Number<li><input type="address" id="hno" placeholder="Enter houseno" required  ></li>
        Email-Id<li><input type="email" id="email" placeholder="Enter email" required>  </li>
        Mobile Number<li><input type="tel" id="phno" placeholder="Enter mobileno" required>  </li>
        Password<li><input type="password" id="pwd" placeholder="Enter password" required> </li>
    </ul>
    <h3 class="purpose">Resident Type</h3>
    Owner<input type="radio" id="owner" name="res" value="Owner" class="own">
    Tenant<input type="radio" id="tenant" name="res" value="Tenant" class="ten"></br>
    <button><a href="./register.html">Register</a></button>
    <button><a href="./login.html">Login</a></button>
    



</form>
    
</body>
</html>
